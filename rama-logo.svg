<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ramaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Halo/Divine aura -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#ramaGradient)" stroke-width="2" opacity="0.6"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#ramaGradient)" stroke-width="1" opacity="0.3"/>
  
  <!-- Head -->
  <circle cx="50" cy="32" r="14" fill="url(#ramaGradient)"/>
  
  <!-- Tilak (forehead mark) -->
  <ellipse cx="50" cy="27" rx="6" ry="3" fill="#FF6B00"/>
  
  <!-- Body -->
  <ellipse cx="50" cy="55" rx="12" ry="18" fill="url(#ramaGradient)"/>
  
  <!-- Arms -->
  <line x1="38" y1="50" x2="20" y2="55" stroke="url(#ramaGradient)" stroke-width="3" stroke-linecap="round"/>
  <line x1="62" y1="50" x2="80" y2="55" stroke="url(#ramaGradient)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Legs -->
  <line x1="44" y1="73" x2="42" y2="88" stroke="url(#ramaGradient)" stroke-width="3" stroke-linecap="round"/>
  <line x1="56" y1="73" x2="58" y2="88" stroke="url(#ramaGradient)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Lotus flower at base -->
  <g transform="translate(50, 92)">
    <circle cx="0" cy="0" r="4" fill="#FFD700"/>
    <circle cx="-3" cy="-2" r="2.5" fill="#FFD700" opacity="0.8"/>
    <circle cx="3" cy="-2" r="2.5" fill="#FFD700" opacity="0.8"/>
    <circle cx="-2" cy="3" r="2.5" fill="#FFD700" opacity="0.8"/>
    <circle cx="2" cy="3" r="2.5" fill="#FFD700" opacity="0.8"/>
  </g>
</svg>